name: Stacked PR
version: 1
min_spine_version: "0.8.0"
start_node: InspectStack

nodes:
  - name: InspectStack
    kind: agent
    description: "List stacked branches, base branch, and rebase order."

  - name: Rebase
    kind: agent
    description: "Rebase current branch onto updated base; surface conflicts."

  - name: ResolveConflicts
    kind: agent
    description: "Resolve merge conflicts with minimal scope; run targeted tests."

  - name: Verify
    kind: checkpoint
    description: "Run CI-equivalent checks before pushing updated stack."

edges:
  - from: InspectStack
    to: Rebase
  - from: Rebase
    to: ResolveConflicts
  - from: ResolveConflicts
    to: Verify
