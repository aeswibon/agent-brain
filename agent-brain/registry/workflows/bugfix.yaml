name: Bugfix Loop
version: 1
min_spine_version: "0.8.0"
start_node: Reproduce

nodes:
  - name: Reproduce
    kind: agent
    description: "Reproduce the reported bug with minimal steps and capture logs."

  - name: Isolate
    kind: agent
    description: "Narrow root cause — bisect, trace, or minimal failing test."

  - name: Fix
    kind: agent
    description: "Implement the smallest correct fix."

  - name: Verify
    kind: checkpoint
    description: "Run tests and confirm the bug is fixed without regressions."

edges:
  - from: Reproduce
    to: Isolate
  - from: Isolate
    to: Fix
  - from: Fix
    to: Verify
