name: Release Notes
version: 1
min_spine_version: "0.8.0"
start_node: CollectDiff

nodes:
  - name: CollectDiff
    kind: agent
    description: "Gather git tag/range diff, commits, and changed files for the release."

  - name: DraftChangelog
    kind: agent
    description: "Write release notes from the diff — user-facing changes, breaking changes, contributors."

  - name: ReviewGate
    kind: approval_gate
    description: "Human reviews draft release notes before publish."

  - name: Publish
    kind: agent
    description: "Update CHANGELOG.md and prepare GitHub release text."

edges:
  - from: CollectDiff
    to: DraftChangelog
  - from: DraftChangelog
    to: ReviewGate
  - from: ReviewGate
    to: Publish
