name: Stage test

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test and snapshot build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1

      - name: Run tests
        run: cargo test --release -p agent-brain

      - name: Snapshot build
        run: cargo build --release -p agent-brain

      - name: Stage snapshot binary
        run: |
          mkdir -p dist
          cp target/release/agent-brain "dist/agent-brain-snapshot-linux-x86_64-${{ github.sha }}"
          chmod +x "dist/agent-brain-snapshot-linux-x86_64-${{ github.sha }}"

      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-brain-snapshot-linux-x86_64
          path: dist/agent-brain-snapshot-linux-x86_64-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
